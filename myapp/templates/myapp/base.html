<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}动漫风格转换系统{% endblock %}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f5f5f5;
            color: #333;
            line-height: 1.6;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .header {
            border-bottom: 2px solid #333;
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        .header p {
            color: #666;
            margin-top: 5px;
            font-size: 14px;
        }

        .nav {
            display: flex;
            gap: 30px;
            margin-bottom: 40px;
            padding-bottom: 15px;
            border-bottom: 1px solid #ddd;
        }

        .nav a {
            text-decoration: none;
            color: #666;
            font-size: 14px;
            padding-bottom: 15px;
            margin-bottom: -15px;
            border-bottom: 2px solid transparent;
            transition: color 0.2s;
        }

        .nav a:hover {
            color: #333;
        }

        .nav a.active {
            color: #000;
            border-bottom-color: #000;
            font-weight: 500;
        }

        .card {
            background: #fff;
            border: 1px solid #e0e0e0;
            padding: 30px;
        }

        h2 {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 25px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 8px;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="text"],
        input[type="url"],
        textarea,
        select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ccc;
            font-size: 14px;
            font-family: inherit;
            background: #fff;
        }

        input:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: #333;
        }

        textarea {
            min-height: 100px;
            resize: vertical;
        }

        button,
        input[type="submit"] {
            background: #764BA2FF;
            color: #fff;
            border: none;
            padding: 12px 24px;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover,
        input[type="submit"]:hover {
            background: #667EEAFF;
        }

        button.secondary {
            background: #fff;
            color: #333;
            border: 1px solid #333;
        }

        button.secondary:hover {
            background: #f5f5f5;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .alert {
            padding: 15px;
            margin-top: 20px;
            border-left: 3px solid;
        }

        .alert-success {
            background: #f0f0f0;
            border-left-color: #333;
        }

        .alert-error {
            background: #f0f0f0;
            border-left-color: #999;
        }

        .info-text {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }

        code {
            background: #f0f0f0;
            padding: 2px 6px;
            font-family: "Monaco", "Menlo", monospace;
            font-size: 12px;
        }

        a {
            color: #333;
            text-decoration: underline;
        }

        a:hover {
            text-decoration: none;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 600px) {
            .grid-2 {
                grid-template-columns: 1fr;
            }

            .nav {
                gap: 20px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>动漫风格转换系统</h1>
        <p>智能爬取 + AI风格转换</p>
    </div>

    <div class="nav">
        <a href="{% url 'index' %}" class="{% if request.path == '/' %}active{% endif %}">首页</a>
        <a href="{% url 'crawler' %}" class="{% if 'crawler' in request.path %}active{% endif %}">图片爬取</a>
        <a href="{% url 'transform' %}" class="{% if 'transform' in request.path %}active{% endif %}">风格转换</a>
    </div>

    {% block content %}{% endblock %}
</div>

{% block extra_js %}{% endblock %}
</body>
</html>
